services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
     - frontend

  frontend:
    image: ghcr.io/milesbellaire/milesbellairefe:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

  backend:
    image: ghcr.io/milesbellaire/milesbellairebe:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5084:5084"
    environment:
      - ConnectionStrings__MySQL=Server=mysql;Database=${DB_NAME};User=${DB_USER};Password=${MYSQL_PASSWORD};
      - ASPNETCORE_URLS=http://+:8080;http://+:5084
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
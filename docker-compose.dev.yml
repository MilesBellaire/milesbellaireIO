services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ../milesbellaireFE:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      - WDS_SOCKET_PORT=0 

  backend:
    image: local-backend:dev
    build:
      context: ../milesbellaireBE
      dockerfile: dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
